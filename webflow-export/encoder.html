    <body>
      <div class="container">
        <h1>🔗 Magic Link URL Generator</h1>
        <div class="info">
          <p><strong>Instructions:</strong> Fill in the fields below to generate a complete magic link URL for Customer.io. The destination URL will be automatically encoded using base64url encoding.</p>
        </div>
        <div class="form-group">
          <label for="brand">Brand:</label>
          <select id="brand">
            <option value="">Select a brand...</option>
            <option value="hookuplists">Hookup Lists</option>
            <option value="heebnewsletters">Heeb Newsletters</option>
            <option value="thepicklereport">The Pickle Report</option>

            <option value="hardresets">Hard Resets</option>
            <option value="batmitzvahhorrorstories">Bat Mitzvah Horror Stories</option>
            <option value="grapejuiceandnostalgia">Grape Juice and Nostalgia</option>
            <option value="highdiaries">High Diaries</option>
            <option value="hipspeak">Hipspeak</option>
            <option value="millennialvsgenz">Millennial vs Gen Z</option>
            <option value="obscuremixtape">Obscure Mixtape</option>
            <option value="onetimeatcamp">One Time at Camp</option>
            <option value="thecomingofageparty">The Coming of Age Party</option>
            <option value="thedadsdad">The Dad's Dad</option>
            <option value="theeyeballerscookbook">The Eyeballer's Cookbook</option>
            <option value="themixedhome">The Mixed Home</option>
            <option value="thepackandplay">The Pack and Play</option>
            <option value="theproudparent">The Proud Parent</option>
            <option value="thequirkiest">The Quirkiest</option>
            <option value="thestewardprize">The Steward Prize</option>
            <option value="toddlercinema">Toddler Cinema</option>
            <option value="zitsandcake">Zits and Cake</option>
          </select>
        </div>
        <div class="form-group">
          <label for="sitename">Site Name (e.g., NYMag, The Cut, Vulture):</label>
          <input type="text" id="sitename" placeholder="NYMag">
        </div>
        <div class="form-group">
          <label for="destinationUrl">Destination URL (the external URL to redirect to):</label>
          <input type="text" id="destinationUrl" placeholder="https://www.thecut.com/article/polycule-polyamourous-relationship-meaning.html">
        </div>
        <button onclick="generateUrl()">Generate Magic Link URL</button>
        <div id="result" class="result" style="display: none;">
          <div class="result-label">Generated URL (copy this into Customer.io):</div>
          <div class="result-url" id="generatedUrl"></div>
          <button class="copy-btn" onclick="copyToClipboard(event)">Copy to Clipboard</button>
        </div>
      </div>
      <script>
        // Base64url encoding (URL-safe base64)
        function base64UrlEncode(str) {
            return btoa(str)
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=/g, '');
        }
        function appendUtmSource(urlString) {
            const urlObj = new URL(urlString);
            urlObj.searchParams.set('utm_source', 'unaffiliated');
            return urlObj.toString();
        }
        function selectText(element) {
            const range = document.createRange();
            range.selectNodeContents(element);
            const selection = window.getSelection();
            selection.removeAllRanges();
            selection.addRange(range);
        }
        function generateUrl() {
            const brand = document.getElementById('brand').value.trim();
            const sitename = document.getElementById('sitename').value.trim();
            const destinationUrl = document.getElementById('destinationUrl').value.trim();
            if (!brand) {
                alert('Please select a brand');
                return;
            }
            if (!sitename) {
                alert('Please enter a site name');
                return;
            }
            if (!destinationUrl) {
                alert('Please enter a destination URL');
                return;
            }
            // Validate URL format
            let finalDestinationUrl;
            try {
                finalDestinationUrl = appendUtmSource(destinationUrl);
            } catch (e) {
                alert('Please enter a valid URL (must start with http:// or https://)');
                return;
            }
            // Encode the destination URL using base64url
            const encodedUrl = base64UrlEncode(finalDestinationUrl);
            // Generate the magic link URL
            const magicLinkUrl = `https://magic.${brand}.com/?email={{customer.email}}&redirect&sitename=${encodeURIComponent(sitename)}&url=${encodedUrl}`;
            // Display the result
            const generatedEl = document.getElementById('generatedUrl');
            generatedEl.textContent = magicLinkUrl;
            document.getElementById('result').style.display = 'block';
            // Store for copying
            window.generatedUrl = magicLinkUrl;
            // Auto-select the generated URL
            selectText(generatedEl);
        }
        function copyToClipboard(e) {
            if (!window.generatedUrl) {
                alert('Please generate a URL first');
                return;
            }
            const textToCopy = window.generatedUrl;
            // Prefer modern clipboard API
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(textToCopy).then(() => {
                    setCopySuccess(e);
                }).catch(() => {
                    fallbackCopy(textToCopy, e);
                });
            } else {
                fallbackCopy(textToCopy, e);
            }
        }
        function fallbackCopy(text, e) {
            const textarea = document.createElement('textarea');
            textarea.value = text;
            textarea.setAttribute('readonly', '');
            textarea.style.position = 'absolute';
            textarea.style.left = '-9999px';
            document.body.appendChild(textarea);
            textarea.select();
            textarea.setSelectionRange(0, textarea.value.length);
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    setCopySuccess(e);
                } else {
                    alert('Failed to copy. Please select and copy manually.');
                }
            } catch (err) {
                alert('Failed to copy. Please select and copy manually.');
            } finally {
                document.body.removeChild(textarea);
            }
        }
        function setCopySuccess(e) {
            const btn = e?.target;
            if (!btn) return;
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            btn.style.background = '#28a745';
            setTimeout(() => {
                btn.textContent = originalText;
                btn.style.background = '#28a745';
            }, 2000);
        }
        // Allow Enter key to generate
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generateUrl();
            }
        });
    </script>
